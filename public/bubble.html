<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    html, body {
      width: 280px;
      height: 100px;
      background: transparent;
      overflow: hidden;
    }

    .wrap {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      animation: pop-in 0.28s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .bubble {
      background: rgba(255, 255, 255, 0.97);
      color: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 11.5px;
      line-height: 1.5;
      padding: 9px 14px;
      border-radius: 12px;
      max-width: 260px;
      text-align: center;
      box-shadow:
        0 4px 16px rgba(0, 0, 0, 0.14),
        0 1px 4px rgba(0, 0, 0, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    .tail {
      position: absolute;
      bottom: -7px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-top: 8px solid rgba(255, 255, 255, 0.97);
      filter: drop-shadow(0 2px 2px rgba(0,0,0,0.06));
    }

    @keyframes pop-in {
      from { opacity: 0; transform: translateX(-50%) scale(0.88) translateY(-6px); }
      to   { opacity: 1; transform: translateX(-50%) scale(1) translateY(0); }
    }
  </style>
</head>
<body>
  <div class="wrap" id="wrap">
    <div class="bubble" id="text-el"></div>
    <div class="tail"></div>
  </div>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      if (!window.electronAPI) return;
      window.electronAPI.onBubbleText((text) => {
        document.getElementById('text-el').textContent = text;
        // Re-trigger entrance animation
        const w = document.getElementById('wrap');
        w.style.animation = 'none';
        void w.offsetWidth;
        w.style.animation = '';
      });
    });
  </script>
</body>
</html>
