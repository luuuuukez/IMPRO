<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    html, body {
      width: 280px;
      height: 100px;
      background: transparent;
      overflow: hidden;
    }

    .wrap {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      animation: slide-up-bounce 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .bubble {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(245, 248, 255, 0.98));
      color: #0a0e27;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 11.5px;
      font-weight: 500;
      line-height: 1.5;
      padding: 11px 16px;
      border-radius: 14px;
      max-width: 300px;
      text-align: center;
      position: relative;
      border: 1px solid rgba(59, 130, 246, 0.3);
      box-shadow:
        0 0 32px rgba(59, 130, 246, 0.3),
        0 0 16px rgba(99, 179, 237, 0.2),
        0 12px 32px rgba(0, 0, 0, 0.15),
        0 2px 8px rgba(0, 0, 0, 0.1),
        inset 0 1px 3px rgba(255, 255, 255, 0.5),
        inset 0 -1px 3px rgba(59, 130, 246, 0.05);
      animation: glow-pulse 3s ease-in-out infinite;
    }

    @keyframes slide-up-bounce {
      0% {
        opacity: 0;
        transform: translateX(-50%) scale(0.8) translateY(12px);
      }
      60% {
        opacity: 1;
        transform: translateX(-50%) scale(1.02) translateY(-2px);
      }
      80% {
        transform: translateX(-50%) scale(0.98) translateY(1px);
      }
      100% {
        opacity: 1;
        transform: translateX(-50%) scale(1) translateY(0);
      }
    }

    @keyframes glow-pulse {
      0%, 100% {
        box-shadow:
          0 0 24px rgba(59, 130, 246, 0.15),
          0 8px 24px rgba(0, 0, 0, 0.12),
          0 2px 8px rgba(0, 0, 0, 0.08),
          inset 0 1px 2px rgba(255, 255, 255, 0.8),
          inset 0 -1px 2px rgba(0, 0, 0, 0.02);
      }
      50% {
        box-shadow:
          0 0 32px rgba(59, 130, 246, 0.25),
          0 12px 32px rgba(0, 0, 0, 0.15),
          0 2px 8px rgba(0, 0, 0, 0.08),
          inset 0 1px 2px rgba(255, 255, 255, 0.8),
          inset 0 -1px 2px rgba(0, 0, 0, 0.02);
      }
    }
  </style>
</head>
<body>
  <div class="wrap" id="wrap">
    <div class="bubble" id="text-el"></div>
  </div>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      if (!window.electronAPI) return;
      window.electronAPI.onBubbleText((text) => {
        document.getElementById('text-el').textContent = text;
        // Re-trigger entrance animation
        const w = document.getElementById('wrap');
        w.style.animation = 'none';
        void w.offsetWidth;
        w.style.animation = '';
      });
    });
  </script>
</body>
</html>
